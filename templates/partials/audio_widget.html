{% macro audio_widget(episode_id, wrapper_class="px-4 pt-4 pb-5") %}
<div class="{{ wrapper_class }}"
  x-data="{
    playing: false,
    currentTime: 0,
    duration: 0,
    init() {
      const a = $refs.audio;
      if (a.readyState >= 1) this.duration = a.duration;
    },
    toggle() {
      const a = $refs.audio;
      this.playing ? a.pause() : a.play();
      this.playing = !this.playing;
    },
    seek(val) {
      $refs.audio.currentTime = val;
      this.currentTime = val;
    },
    fmt(s) {
      if (!s || isNaN(s)) return '0:00';
      const m = Math.floor(s / 60);
      const sec = String(Math.floor(s % 60)).padStart(2, '0');
      return m + ':' + sec;
    }
  }">
  <audio x-ref="audio" src="/episodes/{{ episode_id }}/audio" preload="metadata"
    @loadedmetadata="duration = $el.duration"
    @timeupdate="currentTime = $el.currentTime"
    @ended="playing = false">
  </audio>
  <div class="flex items-center gap-3 py-1">
    <button @click="toggle()"
      class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-full bg-blue-600 hover:bg-blue-700 text-white transition-colors cursor-pointer">
      <svg x-show="!playing" class="w-3.5 h-3.5 translate-x-px" fill="currentColor" viewBox="0 0 16 16">
        <path d="M3 2.5l10 5.5-10 5.5V2.5z"/>
      </svg>
      <svg x-show="playing" class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 16 16">
        <path d="M4 2h3v12H4zm5 0h3v12H9z"/>
      </svg>
    </button>
    <input type="range" min="0" :max="duration || 0" step="0.1" :value="currentTime"
      @input="seek($event.target.value)"
      class="flex-1 accent-blue-600 cursor-pointer"
      style="overflow: visible;">
    <span x-text="fmt(currentTime) + ' / ' + fmt(duration)"
      class="flex-shrink-0 text-xs text-gray-400 font-mono w-24 text-right tabular-nums"></span>
  </div>
</div>
{% endmacro %}
