{% extends "base.html" %}
{% block title %}Run Log — Earlybird{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Run Log</h1>

<div class="bg-white rounded border border-gray-200 overflow-hidden">
  <table class="w-full text-sm">
    <thead class="bg-gray-50 border-b border-gray-200">
      <tr>
        <th class="text-left px-4 py-3 font-medium text-gray-600">ID</th>
        <th class="text-left px-4 py-3 font-medium text-gray-600">Started</th>
        <th class="text-left px-4 py-3 font-medium text-gray-600">Finished</th>
        <th class="text-left px-4 py-3 font-medium text-gray-600">Status</th>
        <th class="text-right px-4 py-3 font-medium text-gray-600">Newsletters found</th>
        <th class="px-4 py-3"></th>
      </tr>
    </thead>
    {% include "partials/run_log_tbody.html" %}
  </table>
</div>
{% endblock %}
