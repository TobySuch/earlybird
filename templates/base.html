<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Earlybird{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css?v=2">
  <script src="/static/js/htmx.min.js" defer></script>
  <script src="/static/js/alpine.min.js" defer></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex gap-6 text-sm font-medium">
    <a href="/" class="hover:text-blue-600">Dashboard</a>
    <a href="/episodes" class="hover:text-blue-600">Episodes</a>
    <a href="/run-log" class="hover:text-blue-600">Run Log</a>
    <a href="/settings" class="hover:text-blue-600">Settings</a>
  </nav>
  <main class="max-w-5xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
