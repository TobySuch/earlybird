{% extends "base.html" %}
{% block title %}Dashboard — Earlybird{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Dashboard</h1>

<div class="grid grid-cols-2 gap-4 mb-6">
  <div class="p-4 bg-white rounded border border-gray-200">
    <p class="text-sm text-gray-500 mb-1">Latest Episode</p>
    <div class="flex items-end justify-between">
      {% if latest_episode %}
      <p class="text-base font-medium text-gray-900">Created {{ latest_episode.created_at | timeago }}</p>
      <a href="/episodes/{{ latest_episode.id }}"
         class="inline-flex items-center justify-center w-9 h-9 bg-blue-600 hover:bg-blue-700 rounded transition-colors mb-0.5"
         title="Latest episode">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
        </svg>
      </a>
      {% else %}
      <p class="text-base text-gray-400">No episodes yet</p>
      {% endif %}
    </div>
  </div>

  {% include "partials/last_run.html" %}
</div>

<div x-data="{ count: null, loading: false, showModal: false, error: null }">

  <div class="flex gap-3 items-center">
    <button
      hx-post="/api/run/trigger"
      hx-swap="none"
      hx-on::after-request="if(event.detail.successful) window.location='/run-log'"
      hx-disabled-elt="this"
      class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 disabled:opacity-50 cursor-pointer">
      Run now
    </button>

    <button
      @click="
        loading = true; error = null;
        fetch('/api/unprocessed-count')
          .then(r => r.json())
          .then(data => { loading = false; count = data.count; error = data.error || null; showModal = true; })
          .catch(() => { loading = false; error = 'Network error — could not reach the server.'; showModal = true; });
      "
      :disabled="loading"
      class="px-4 py-2 bg-white text-gray-700 border border-gray-300 rounded hover:bg-gray-50 disabled:opacity-50 cursor-pointer">
      <span x-show="!loading">Check inbox</span>
      <span x-show="loading">Checking…</span>
    </button>
  </div>

  <!-- Modal backdrop -->
  <div
    x-show="showModal"
    x-transition.opacity
    class="fixed inset-0 bg-black/40 flex items-center justify-center z-50"
    @click.self="showModal = false">

    <div class="bg-white rounded-lg shadow-xl p-6 max-w-sm w-full mx-4">
      <template x-if="error">
        <div>
          <p class="text-base font-medium text-gray-900 mb-1">Could not check inbox</p>
          <p class="text-sm text-gray-500" x-text="error"></p>
        </div>
      </template>
      <template x-if="!error">
        <div>
          <p class="text-base font-medium text-gray-900 mb-1">Inbox check</p>
          <p class="text-sm text-gray-700">
            <span x-text="count"></span><span x-text="count === 1 ? ' unprocessed email' : ' unprocessed emails'"></span>
            in your Newsletters inbox.
          </p>
        </div>
      </template>
      <button
        @click="showModal = false"
        class="mt-4 px-4 py-2 bg-blue-600 text-white text-sm rounded hover:bg-blue-700 cursor-pointer w-full">
        OK
      </button>
    </div>
  </div>

</div>
{% endblock %}
