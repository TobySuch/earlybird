{% extends "base.html" %}
{% block title %}Setup — Earlybird{% endblock %}
{% block nav %}{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <h1 class="text-2xl font-semibold mb-2">Welcome to Earlybird</h1>
  <p class="text-sm text-gray-500 mb-6">Create your account to get started.</p>
  <form method="post" action="/auth/signup" class="bg-white border border-gray-200 rounded-lg p-6 space-y-4">
    {% if error %}
    <p class="text-red-600 text-sm">{{ error }}</p>
    {% endif %}
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="username">Username</label>
      <input
        id="username" name="username" type="text" required autofocus
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
      <input
        id="password" name="password" type="password" required minlength="8"
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="confirm_password">Confirm password</label>
      <input
        id="confirm_password" name="confirm_password" type="password" required
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="signup_code">
        Setup code
        <span class="text-gray-400 font-normal">(printed to server logs on first run)</span>
      </label>
      <input
        id="signup_code" name="signup_code" type="text" required
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
    </div>
    <button type="submit" class="w-full bg-blue-600 text-white rounded px-4 py-2 text-sm font-medium hover:bg-blue-700">
      Create account
    </button>
  </form>
</div>
{% endblock %}
