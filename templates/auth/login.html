{% extends "base.html" %}
{% block title %}Login — Earlybird{% endblock %}
{% block nav %}{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <h1 class="text-2xl font-semibold mb-6">Earlybird</h1>
  <form method="post" action="/auth/login" class="bg-white border border-gray-200 rounded-lg p-6 space-y-4">
    {% if error %}
    <p class="text-red-600 text-sm">{{ error }}</p>
    {% endif %}
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="username">Username</label>
      <input
        id="username" name="username" type="text" required autofocus
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
      <input
        id="password" name="password" type="password" required
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
    </div>
    <button type="submit" class="w-full bg-blue-600 text-white rounded px-4 py-2 text-sm font-medium hover:bg-blue-700 cursor-pointer">
      Log in
    </button>
  </form>
</div>
{% endblock %}
