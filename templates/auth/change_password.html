{% extends "base.html" %}
{% block title %}Change Password — Earlybird{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <h1 class="text-2xl font-semibold mb-6">Change password</h1>
  <form method="post" action="/auth/change-password" class="bg-white border border-gray-200 rounded-lg p-6 space-y-4">
    {% if saved %}
    <p class="text-green-600 text-sm">Password changed successfully.</p>
    {% endif %}
    {% if error %}
    <p class="text-red-600 text-sm">{{ error }}</p>
    {% endif %}
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="current_password">Current password</label>
      <input
        id="current_password" name="current_password" type="password" required autofocus
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="new_password">New password</label>
      <input
        id="new_password" name="new_password" type="password" required minlength="8"
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="confirm_password">Confirm new password</label>
      <input
        id="confirm_password" name="confirm_password" type="password" required minlength="8"
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
    </div>
    <button type="submit" class="w-full bg-blue-600 text-white rounded px-4 py-2 text-sm font-medium hover:bg-blue-700 cursor-pointer">
      Change password
    </button>
  </form>
</div>
{% endblock %}
