name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - run: uv run pytest

  commitlint:
    runs-on: ubuntu-latest
    # Dependabot's auto-generated commit body contains long URLs that exceed
    # body-max-line-length. The commit header format is already enforced via
    # the commit-message prefix in dependabot.yml, so skip linting here.
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json
